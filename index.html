<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐢</text></svg>" />
    <title>TortugaIQ | Long-Term Learning</title>
    <meta name="description" content="TurtleIQ is a personal knowledge management app. Create, organize, and study concepts with markdown notes, spaced repetition tracking, and intelligent filtering." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="TurtleIQ — Personal Knowledge Management" />
    <meta property="og:description" content="Build your personal knowledge base. Organize concepts by subject, track your learning progress, and study smarter with TurtleIQ." />
    <meta property="og:site_name" content="TurtleIQ" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="TurtleIQ — Personal Knowledge Management" />
    <meta name="twitter:description" content="Build your personal knowledge base. Organize concepts by subject, track your learning progress, and study smarter with TurtleIQ." />

    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Skip-link style for keyboard users -->
    <style>
      .skip-link {
        position: absolute;
        left: -9999px;
        top: auto;
        width: 1px;
        height: 1px;
        overflow: hidden;
      }
      .skip-link:focus {
        position: fixed;
        top: 0;
        left: 0;
        width: auto;
        height: auto;
        padding: 0.5rem 1rem;
        background: #4f46e5;
        color: #fff;
        font-size: 0.875rem;
        font-weight: 600;
        z-index: 9999;
        border-radius: 0 0 6px 0;
        outline: 2px solid #fff;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
